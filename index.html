<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#EDF1F5">
  <title>Shakebox</title>
  <meta name="description" content="A magic 8-ball for your family's own toys. Shake it, and it picks something to play with.">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Shakebox">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <!-- Preload the two self-hosted fonts so first paint has them -->
  <link rel="preload" href="fonts/unbounded.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/schibsted-grotesk.woff2" as="font" type="font/woff2" crossorigin>

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" aria-live="polite"></div>

  <script src="seed-toys.js"></script>
  <script src="app.js"></script>
  <script>
    // Register the service worker (PWA / offline). Ignored on file:// and older browsers.
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (e) {
          console.warn('Shakebox: service worker registration failed', e);
        });
      });
    }
  </script>
</body>
</html>
